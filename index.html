<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eyad Watched</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
</head>
<body style="background: #0f1014; color: white; margin: 0; font-family: 'Cairo', sans-serif;">

    <nav style="display: flex; justify-content: space-between; align-items: center; padding: 20px 50px; background: rgba(0,0,0,0.9);">
        <div style="font-size: 24px; font-weight: bold;">Eyad <span style="color: #8a2be2;">Watched</span></div>
        <ul style="display: flex; list-style: none; gap: 20px;">
            <li style="cursor: pointer;">الرئيسية</li>
            <li style="cursor: pointer;">مسلسلات</li>
        </ul>
    </nav>

    <div style="text-align: center; padding: 100px 20px; background: linear-gradient(rgba(15,16,20,0.5), #0f1014);">
        <h1 style="font-size: 3rem; margin: 0;">عالم الترفيه بين يديك</h1>
        <p style="font-size: 1.2rem; opacity: 0.8; margin-top: 10px;">شاهد أحدث الأفلام والمسلسلات بجودة عالية</p>
    </div>

    <main id="main" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 30px; padding: 40px;"></main>

    <script src="script.js"></script>
</body>
</html>
